version: '3.8'

services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - USER_SERVICE_URL=http://user-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
      - PRODUCT_SERVICE_URL=http://product-service:8083
    depends_on:
      - redis
      - user-service
      - order-service
      - product-service

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  user-service:
    image: your-user-service:latest
    ports:
      - "8081:8081"

  order-service:
    image: your-order-service:latest
    ports:
      - "8082:8082"

  product-service:
    image: your-product-service:latest
    ports:
      - "8083:8083"

volumes:
  redis-data: